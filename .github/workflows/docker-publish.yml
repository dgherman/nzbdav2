name: Build and Push Docker image to GHCR

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Uncomment below if you want to push to Docker Hub
      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v4
      #   with:
      #     registry: docker.io
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set tags and NZBDAV_VERSION
        id: set_vars
        run: |
          # Single source of truth: VERSION file at repo root (format MAJOR.MINOR.PATCH)
          VERSION=$(tr -d '[:space:]' < VERSION)
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::VERSION file must contain MAJOR.MINOR.PATCH, got '$VERSION'"
            exit 1
          fi
          MAJOR="${VERSION%%.*}"
          MINOR="$(echo "$VERSION" | cut -d. -f2)"
          PATCH="${VERSION##*.}"

          # Sanitize branch name for use as a Docker tag (replace / with -)
          SAFE_REF=$(echo "${{ github.ref_name }}" | tr '/' '-')

          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "NZBDAV_VERSION=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
          else
            echo "NZBDAV_VERSION=${SAFE_REF}" >> $GITHUB_OUTPUT
          fi

          GHCR_REPO="ghcr.io/${{ github.repository }}"
          # DOCKERHUB_REPO="dgherman/nzbdav"  # Uncomment if using Docker Hub
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            {
              echo "TAGS<<EOF"
              echo "${GHCR_REPO}:latest"
              echo "${GHCR_REPO}:${MAJOR}.${MINOR}.${PATCH}"
              echo "${GHCR_REPO}:${MAJOR}.${MINOR}.x"
              echo "${GHCR_REPO}:${MAJOR}.x"
              # Add Docker Hub tags if using Docker Hub
              # echo "${DOCKERHUB_REPO}:latest"
              # echo "${DOCKERHUB_REPO}:${MAJOR}.${MINOR}.${PATCH}"
              # echo "${DOCKERHUB_REPO}:${MAJOR}.${MINOR}.x"
              # echo "${DOCKERHUB_REPO}:${MAJOR}.x"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "TAGS=${GHCR_REPO}:${SAFE_REF}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image (amd64 + arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.set_vars.outputs.TAGS }}
          build-args: |
            NZBDAV_VERSION=${{ steps.set_vars.outputs.NZBDAV_VERSION }}
            CACHE_BUST=${{ github.sha }}
